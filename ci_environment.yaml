name: nessai-ci
channels:
  - conda-forge
dependencies:
  - numpy
  - pandas
  - scipy>=0.16
  - matplotlib<3.11    # arviz/corner doesn't work with matplotlib 3.11 yet
  - seaborn
  - pytorch-cpu>=2.0
  - glasflow
  - h5py
  - corner
  - bilby
  - astropy
  - multiprocess
  - pytest
  - pytest-cov
  - pytest-timeout
  - pytest-rerunfailures
  - pytest-integration
  - pip
  - pip:
    - ray[default] ; (sys_platform != 'win32' and python_version < '3.12') or (sys_platform == 'win32' and python_version < '3.12')
